services:
  grafana:
    user: root
    container_name: 'bernspedras-topology-dashboard-app'
    build:
      context: .
      args:
        grafana_image: ${GRAFANA_IMAGE:-grafana-enterprise}
        grafana_version: ${GRAFANA_VERSION:-11.4.0}
        development: ${DEVELOPMENT:-false}
        anonymous_auth_enabled: ${ANONYMOUS_AUTH_ENABLED:-true}
    ports:
      - 3000:3000/tcp
    volumes:
      - grafana-storage:/var/lib/grafana
      - ../dist:/var/lib/grafana/plugins/bernspedras-topology-dashboard-app
      - ../provisioning:/etc/grafana/provisioning
      - ..:/root/bernspedras-topology-dashboard-app
    environment:
      NODE_ENV: development
      GF_PATHS_DATA: /var/lib/grafana
      GF_LOG_FILTERS: plugin.bernspedras-topology-dashboard-app:debug
      GF_LOG_LEVEL: debug
      GF_DATAPROXY_LOGGING: 1
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: bernspedras-topology-dashboard-app
      GF_FEATURE_TOGGLES_ENABLE: externalServiceAccounts
