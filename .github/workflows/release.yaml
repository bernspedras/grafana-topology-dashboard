name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GRAFANA_ACCESS_POLICY_TOKEN: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Build backend (all platforms)
        run: go run github.com/magefile/mage -v buildAll

      - name: Sign plugin
        run: npx --yes @grafana/sign-plugin@latest

      - name: Validate plugin
        run: npx --yes @grafana/plugin-validator@latest -sourceCodeUri "${{ github.server_url }}/${{ github.repository }}" dist/

      - name: Package plugin
        run: |
          PLUGIN_ID=$(jq -r '.id' dist/plugin.json)
          VERSION=$(jq -r '.info.version' dist/plugin.json)
          mv dist "$PLUGIN_ID"
          zip -r "${PLUGIN_ID}-${VERSION}.zip" "$PLUGIN_ID"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
